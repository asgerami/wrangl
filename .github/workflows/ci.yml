name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Skip tests that reach out to the public internet so CI is deterministic;
      # the local-HTTP and in-memory tests still run.
      - run: npm test
        env:
          MCPIFY_SKIP_NETWORK: "1"
