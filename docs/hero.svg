<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="280" viewBox="0 0 1000 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12141c"/>
      <stop offset="1" stop-color="#1b2440"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="280" rx="16" fill="url(#bg)"/>
  <text x="48" y="86" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-1">🔌 MCPify</text>
  <text x="48" y="128" font-size="21" fill="#c7cbe0">Turn any REST API into an agent-ready MCP server — in one command.</text>

  <!-- terminal card -->
  <rect x="48" y="160" width="904" height="86" rx="10" fill="#0c0e15" stroke="#2b3350"/>
  <circle cx="70" cy="182" r="5" fill="#ff5f57"/>
  <circle cx="88" cy="182" r="5" fill="#febc2e"/>
  <circle cx="106" cy="182" r="5" fill="#28c840"/>
  <text x="70" y="216" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#e6e8f0"><tspan fill="#4d8bff">$</tspan> npx mcpify install https://api.stripe.com</text>
  <text x="70" y="236" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#8b90a8"><tspan fill="#4ac66b">✓</tspan> discovered spec  <tspan fill="#4ac66b">✓</tspan> generated 587 tools  <tspan fill="#4ac66b">✓</tspan> added to Claude — restart & go</text>
</svg>
